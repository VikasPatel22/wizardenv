name: Publish to PyPI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  release:
    types: [published]

  # Allow manual trigger from the Actions tab
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (build only, do not publish)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

jobs:
  # ─────────────────────────────────────────────
  # Job 1 — Build the distribution packages
  # ─────────────────────────────────────────────
  build:
    name: Build distribution
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install build tools
        run: python -m pip install --upgrade pip build

      - name: Build source distribution and wheel
        run: python -m build

      - name: Verify distribution contents
        run: |
          pip install twine
          twine check dist/*

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

  # ─────────────────────────────────────────────
  # Job 2 — Publish to PyPI (Trusted Publisher)
  # ─────────────────────────────────────────────
  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run == 'false')

    environment:
      name: pypi
      url: https://pypi.org/p/wizardenv

    permissions:
      id-token: write   # Required for Trusted Publisher (OIDC)

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish package to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          print-hash: true
